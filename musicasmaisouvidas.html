<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Músicas Mais Ouvidas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  text-align: center;
}

/* Botão voltar */
.voltar {
  position: absolute;
  top: 20px;
  left: 20px;
}

.voltar a {
  text-decoration: none;
  background: white;
  color: black;
  padding: 10px 15px;
  border-radius: 5px;
  font-weight: bold;
}

/* Container */
.container {
  margin-top: 80px;
}

/* Cards */
.card {
  background: #181818;
  padding: 15px;
  margin: 15px auto;
  width: 300px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #282828;
}

img {
  width: 100%;
  border-radius: 10px;
}

.titulo {
  color: #1db954;
  font-weight: bold;
  font-size: 18px;
}
</style>

</head>

<body>

<div class="voltar">
  <a href="index.html">⬅ Voltar</a>
</div>

<div class="container">
  <h1>🔥 Músicas Mais Ouvidas</h1>

  <div class="card">
    <div class="card">
    <img src="imagens/artistagenerico.jpg" width="100px">
    <p class="titulo">Artista genérico</p>
    <p>Veigh</p>
  </div>

  <div class="card">
   <div class="card">
    <img src="imagens/ultimavez.jpg" width="100px">
    <p class="titulo">Ultima vez</p>
    <p>Tim bernardes</p>
  </div>

  <div class="card">
   <div class="card">
    <img src="imagens/coisascaras.jpg" width="100px">
    <p class="titulo">Coisas caras</p>
    <p>Brocasito</p>
  </div>

  <div class="card">
    <div class="card">
    <img src="imagens/bemquerer.jpg" width="100px">
    <p class="titulo">Bem querer</p>
    <p>Panda</p>
  </div>

  <div class="card">
    <div class="card">
    <img src="imagens/aliança.jpg" width="100px">
    <p class="titulo">Aliança</p>
    <p>Tribalistas</p>
  </div>

</div>

</body>
</html>
