<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Artistas Mais Ouvidos</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  text-align: center;
}

/* Botão voltar */
.voltar {
  position: absolute;
  top: 20px;
  left: 20px;
}

.voltar a {
  text-decoration: none;
  background: white;
  color: black;
  padding: 10px 15px;
  border-radius: 5px;
  font-weight: bold;
}

/* Container */
.container {
  margin-top: 80px;
}

/* Cards */
.card {
  background: #181818;
  padding: 15px;
  margin: 15px auto;
  width: 300px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #282828;
}

img {
  width: 60%;
  border-radius: 50%;
}

.titulo {
  color: #1db954;
  font-weight: bold;
  font-size: 20px;
}
</style>

</head>

<body>

<div class="voltar">
  <a href="index.html">⬅ Voltar</a>
</div>

<div class="container">
  <h1>🎤 Artistas Mais Ouvidos</h1>
  <p>Os artistas que você mais escutou</p>

  <div class="card">
    <img src="imagens/imagem.jpg" width="100px">
    <p class="titulo">Top 1 - Artista</p>
  </div>

  <div class="card">
    <img src="imagens/tim bernardes.jpeg" width="100px">
    <p class="titulo">Top 2 - Artista</p>
  </div>

  <div class="card">
   <img src="imagens/brocasito.jpg" width="100px">
    <p class="titulo">Top 3 - Artista</p>
  </div>

  <div class="card">
   <img src="imagens/panda2.0.jpg" width="100px">
    <p class="titulo">Top 4 - Artista</p>
  </div>

  <div class="card">
    <img src="imagens/tribalistas.jpg" width="100px">

    <p class="titulo">Top 5 - Artista</p>
  </div>

</div>

</body>
</html>
